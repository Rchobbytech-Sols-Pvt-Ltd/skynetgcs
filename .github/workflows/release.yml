name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Wails app
        run: wails build -platform windows/amd64 -o skynetgcs.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer\setup.iss
        shell: cmd

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }

          $zip = "build/skynetgcs-windows-amd64-$version.zip"

          New-Item -ItemType Directory -Force -Path build | Out-Null

          Compress-Archive `
            -Path build/bin/skynetgcs.exe `
            -DestinationPath $zip `
            -Force

      # ✅ FIXED STEP (properly indented)
      - name: Carry forward component zips from releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Continue"

          New-Item -ItemType Directory -Force -Path build | Out-Null

          # Get latest 5 releases
          $releases = gh release list `
            --repo $env:GITHUB_REPOSITORY `
            --limit 5 `
            --json tagName `
            --jq '.[].tagName'

          if (-not $releases) {
            Write-Warning "No releases found"
            exit 0
          }

          $found = @{
            airunit = $false
            hci = $false
          }

          foreach ($tag in $releases) {
            Write-Host "Checking release: $tag"

            $assets = gh release view $tag `
              --repo $env:GITHUB_REPOSITORY `
              --json assets `
              --jq '.assets[].name'

            foreach ($file in $assets) {

              $lower = $file.ToLower()

              # AirUnit match
              if (-not $found.airunit -and $lower.Contains("airunit")) {
                gh release download $tag `
                  --pattern $file `
                  --dir build `
                  --repo $env:GITHUB_REPOSITORY

                Write-Host "Fetched AirUnit: $file"
                $found.airunit = $true
              }

              # HCI match
              if (-not $found.hci -and (
                  $lower.Contains("hci") -or
                  $lower.Contains("human_computer_interface")
              )) {
                gh release download $tag `
                  --pattern $file `
                  --dir build `
                  --repo $env:GITHUB_REPOSITORY

                Write-Host "Fetched HCI: $file"
                $found.hci = $true
              }
            }

            if ($found.airunit -and $found.hci) {
              break
            }
          }

          if (-not $found.airunit) {
            Write-Warning "AirUnit zip not found in recent releases"
          }

          if (-not $found.hci) {
            Write-Warning "HCI zip not found in recent releases"
          }

          if ($found.airunit -or $found.hci) {
            Write-Host "Proceeding with available components"
          } else {
            Write-Warning "No components found at all"
          }

          exit 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skynetgcs-windows
          path: |
            build/bin/skynetgcs.exe
            build/installer/*.exe
            build/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/installer/*.exe
            build/*.zip
          generate_release_notes: true