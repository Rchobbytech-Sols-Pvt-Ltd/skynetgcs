name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Wails app
        run: wails build -platform windows/amd64 -o skynetgcs.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer\setup.iss
        shell: cmd

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }

          $zip = "build/skynetgcs-windows-amd64-$version.zip"

          New-Item -ItemType Directory -Force -Path build | Out-Null

          Compress-Archive `
            -Path build/bin/skynetgcs.exe `
            -DestinationPath $zip `
            -Force

      # ✅ FIXED STEP
      - name: Carry forward component zips from current latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prevent script from failing on non-critical errors
          $ErrorActionPreference = "Continue"

          $patterns = @("AirUnit*.zip", "HCI*.zip")
          $foundAny = $false
          $missing = @()

          foreach ($pattern in $patterns) {
            $before = @(Get-ChildItem build -Filter $pattern -ErrorAction SilentlyContinue).Count

            try {
              gh release download --pattern $pattern --dir build `
                --repo $env:GITHUB_REPOSITORY 2>$null
            } catch {
              Write-Warning "Could not fetch ${pattern}: $_"
            }

            $matched = @(Get-ChildItem build -Filter $pattern -ErrorAction SilentlyContinue)

            if ($matched.Count -gt $before) {
              $foundAny = $true
              foreach ($f in $matched) {
                Write-Host "Carried forward $($f.Name)"
              }
            } else {
              $missing += $pattern
            }
          }

          if (-not $foundAny) {
            Write-Warning "No component zips found (AirUnit/HCI)."
            Write-Warning "Launcher updates may fail with 'Resource not found'."
          } elseif ($missing.Count -gt 0) {
            Write-Host "Proceeding: partial components present ($($missing -join ', '))"
          } else {
            Write-Host "All components successfully carried forward."
          }

          # 🔴 CRITICAL: ensure step never fails
          exit 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skynetgcs-windows
          path: |
            build/bin/skynetgcs.exe
            build/installer/*.exe
            build/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/installer/*.exe
            build/*.zip
          generate_release_notes: true